<!-- Reusable logo mark: a dog-eared document with text lines and an editing
     pencil. Drawn in a 1024x1024 box, visually centred. White page + amber pencil
     so it reads on the blue brand background. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0b1f4d" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Page body (dog-eared top-right corner, rounded elsewhere) -->
  <g filter="url(#ds)">
    <path fill="#ffffff" d="
      M 352 232
      L 584 232
      L 704 352
      L 704 760
      Q 704 792 672 792
      L 352 792
      Q 320 792 320 760
      L 320 264
      Q 320 232 352 232
      Z"/>
  </g>
  <!-- Folded corner -->
  <path fill="#cbd5e1" d="M 584 232 L 584 352 L 704 352 Z"/>
  <path fill="#94a3b8" d="M 584 352 L 704 352 L 584 232 Z" opacity="0.0"/>

  <!-- Text lines -->
  <rect x="360" y="430" width="206" height="28" rx="14" fill="#93c5fd"/>
  <rect x="360" y="490" width="284" height="28" rx="14" fill="#bfdbfe"/>
  <rect x="360" y="550" width="240" height="28" rx="14" fill="#bfdbfe"/>

  <!-- Editing pencil, diagonal over the lower-right -->
  <g transform="rotate(45 560 612)">
    <!-- eraser -->
    <rect x="528" y="468" width="64" height="40" rx="14" fill="#f43f5e"/>
    <!-- ferrule -->
    <rect x="528" y="504" width="64" height="20" fill="#e2e8f0"/>
    <!-- body -->
    <rect x="528" y="520" width="64" height="180" fill="#f59e0b"/>
    <!-- wood tip -->
    <path fill="#fcd34d" d="M 528 700 L 592 700 L 560 760 Z"/>
    <!-- graphite -->
    <path fill="#1f2937" d="M 548 730 L 572 730 L 560 760 Z"/>
  </g>
</svg>
