// The Capacitor 8 Filesystem/Share plugins pin a Java 21 toolchain. This machine
// only has JDK 23/25, so let Gradle auto-provision a matching JDK 21 on demand
// (foojay Disco API) instead of requiring a manual install.
plugins {
    id 'org.gradle.toolchains.foojay-resolver-convention' version '0.9.0'
}

include ':app'
include ':capacitor-cordova-android-plugins'
project(':capacitor-cordova-android-plugins').projectDir = new File('./capacitor-cordova-android-plugins/')

apply from: 'capacitor.settings.gradle'