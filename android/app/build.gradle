apply plugin: 'com.android.application'

// Release signing. Secrets live in android/keystore.properties (gitignored) so they never land in
// the repo; when the file is absent (CI, a fresh clone, debug-only work) release signing is simply
// skipped and the build still works. See docs/release-signing.md.
def keystorePropsFile = rootProject.file("keystore.properties")
def keystoreProps = new Properties()
if (keystorePropsFile.exists()) {
    keystoreProps.load(new FileInputStream(keystorePropsFile))
}

android {
    namespace = "com.armitorenk.pdfeditor"
    compileSdk = rootProject.ext.compileSdkVersion
    ndkVersion = "28.2.13676358"
    defaultConfig {
        applicationId "com.armitorenk.pdfeditor"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        // Native PDF object-editing engine (PDFium JNI). arm64-v8a only for now; widen later.
        ndk {
            abiFilters "arm64-v8a"
        }
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17"
            }
        }
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    externalNativeBuild {
        cmake {
            path = file("src/main/cpp/CMakeLists.txt")
            version = "3.22.1"
        }
    }
    signingConfigs {
        if (keystorePropsFile.exists()) {
            release {
                storeFile file(keystoreProps['storeFile'])
                storePassword keystoreProps['storePassword']
                keyAlias keystoreProps['keyAlias']
                keyPassword keystoreProps['keyPassword']
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (keystorePropsFile.exists()) {
                signingConfig signingConfigs.release
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

// ---- PDFium native engine (object editing) — Decision A ------------------------------------------
// Prebuilt PDFium binaries are fetched from bblanchon/pdfium-binaries at build time and dropped into
// src/main/jniLibs/<abi>/libpdfium.so + src/main/cpp/pdfium/include. They are NOT committed (see
// android/.gitignore); a clean checkout downloads them on first build. Runs in the configuration
// phase, guarded by file existence, so CMake's IMPORTED pdfium target resolves before native build.
def pdfiumBuild = "7906"  // bblanchon/pdfium-binaries release tag: chromium/7906
def pdfiumAbis = ["arm64-v8a": "arm64"]  // Android ABI -> bblanchon arch suffix (add arm/x64/x86 later)
def pdfiumIncludeDir = file("src/main/cpp/pdfium/include")
def pdfiumJniLibsDir = file("src/main/jniLibs")

def ensurePdfium = {
    pdfiumAbis.each { abi, arch ->
        def soFile = file("$pdfiumJniLibsDir/$abi/libpdfium.so")
        def headerFile = file("$pdfiumIncludeDir/fpdfview.h")
        if (soFile.exists() && headerFile.exists()) return  // already installed

        def workDir = layout.buildDirectory.dir("pdfium").get().asFile
        workDir.mkdirs()
        def tgz = new File(workDir, "pdfium-android-${arch}.tgz")
        if (!tgz.exists()) {
            def url = "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium/${pdfiumBuild}/pdfium-android-${arch}.tgz"
            logger.lifecycle("PDFium: downloading ${arch} (chromium/${pdfiumBuild})...")
            ant.get(src: url, dest: tgz, verbose: false)
        }
        def extractDir = new File(workDir, "extract-${arch}")
        delete extractDir
        copy {
            from tarTree(resources.gzip(tgz))
            into extractDir
        }
        copy {
            from new File(extractDir, "include")
            into pdfiumIncludeDir
        }
        copy {
            from new File(extractDir, "lib/libpdfium.so")
            into new File(pdfiumJniLibsDir, abi)
        }
        logger.lifecycle("PDFium: installed ${abi} -> ${soFile}")
    }
}
ensurePdfium()
